name: Deploy infrastructure

# Manual infrastructure deploy (Bicep) for an environment. Deliberately NOT on
# push: a full `az deployment sub create` per commit is wasteful and would fight
# the operator's own changes. Trigger from the Actions tab when infra actually
# changes.
#
# The SPA itself is deployed separately and automatically: dev by deploy-dev.yml
# (tracks main on every push), prod by deploy-prod.yml (on a published release).

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        type: choice
        options: [dev, prod]
        default: dev

permissions:
  contents: read

concurrency:
  group: deploy-infra-${{ inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  infra:
    name: Deploy infrastructure
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    permissions:
      id-token: write # required for OIDC federated credentials
      contents: read
    steps:
      - uses: actions/checkout@v4

      # OIDC federated credentials: no long-lived cloud secret exists in this repo.
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        run: |
          ENV="${{ inputs.environment || 'dev' }}"
          out=$(az deployment sub create \
            --name "durableops-${ENV}-${GITHUB_RUN_ID}" \
            --location westeurope \
            --template-file infra/main.bicep \
            --parameters environment="$ENV" deployTestHarness=false \
            --query properties.outputs -o json)
          echo "Deployed infra for $ENV → https://$(echo "$out" | jq -r '.staticWebAppHostname.value')"
