name: Release

# Automatic semantic versioning via release-please (a GitHub Action — no runtime
# dependency). It watches Conventional Commits on main and maintains an open
# "release" PR that bumps package.json + CHANGELOG.md to the next semver:
#   fix:  -> patch,  feat: -> minor,  feat!/BREAKING CHANGE -> major.
# Merging that PR tags vX.Y.Z and cuts a GitHub Release. The build reads the
# version from package.json, so the footer then shows the released version.
# When a release is cut, this then kicks the prod CD (deploy-prod).

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: write # to dispatch the prod deploy when a release is created

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        id: release

      # A Release created with GITHUB_TOKEN does NOT fire `on: release` in other
      # workflows (GitHub blocks token-created events from cascading). But an
      # explicit workflow_dispatch IS allowed from GITHUB_TOKEN, so dispatch the
      # prod deploy here whenever a release is actually cut.
      - if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # -R is required: this job checks out no code, so gh has no repo context.
        run: gh workflow run deploy-prod.yml --ref main -R ${{ github.repository }}
