name: Deploy dev

# CD for the dev Static Web App (stapp-durableops-dev-wi6b7). The dev instance
# tracks main exactly: every push to main rebuilds the SPA and deploys it, so
# what is running on dev is always the tip of main.
#
# SPA only — infrastructure is deployed deliberately via the manual "Deploy
# infrastructure" workflow, never on every commit. No stored deploy token: OIDC
# fetches the SWA token at deploy time, matching the repo's no-long-lived-secret
# rule. The identity holds Contributor on the dev SWA resource only.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  # Never let two dev deploys overlap; a newer push waits and then supersedes.
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy to dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      # Dev runtime config: single-tenant (pinned to the maintainer's tenant via
      # AZURE_TENANT_ID), the shared public SPA client id, and the operator
      # imprint. Identical to the prod config bar `multitenant` — dev restricts
      # sign-in to one tenant. None of these are secrets (a client/tenant id is
      # public); they live in repo variables so the bundle stays env-agnostic.
      - name: Generate config.json
        run: |
          jq -n \
            --arg clientId "${{ vars.DURABLEOPS_CLIENT_ID }}" \
            --arg tenantId "${{ secrets.AZURE_TENANT_ID }}" \
            --arg name "${{ vars.DURABLEOPS_OPERATOR_NAME }}" \
            --arg contact "${{ vars.DURABLEOPS_OPERATOR_CONTACT }}" \
            --arg donate "${{ vars.DURABLEOPS_DONATE_URL }}" \
            '{clientId: $clientId, tenantId: $tenantId, operatorName: $name, operatorContact: $contact, showGitHubStar: true}
              + (if $donate == "" then {} else {donateUrl: $donate} end)' \
            > dist/config.json
          jq -e '.clientId != "" and .tenantId != ""' dist/config.json > /dev/null
          cat dist/config.json

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Fetch the SWA deploy token
        id: token
        run: |
          token=$(az staticwebapp secrets list \
            --name stapp-durableops-dev-wi6b7 --resource-group rg-durableops-dev \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.token.outputs.token }}
          action: upload
          app_location: dist
          skip_app_build: true
          skip_api_build: true

      - run: echo "Deployed dev → https://mango-tree-0cdbe9303.7.azurestaticapps.net"
