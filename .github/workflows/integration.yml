name: Integration (real Azure)

on:
  push:
    branches: [main]
  schedule:
    # Nightly: catches Azure-side drift (runtime upgrades, changed payload
    # shapes) on days nobody merged anything.
    - cron: '23 2 * * *'
  workflow_dispatch:

# Deliberately NOT on pull_request: PR feedback must stay fast and must never
# depend on a live task hub or a cloud credential.

permissions:
  contents: read

concurrency:
  # The harness has ONE task hub; two runs would fight over the same instances.
  group: integration-harness
  cancel-in-progress: false

jobs:
  integration:
    name: API modules against the live harness
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # OIDC federated credentials: no long-lived cloud secret in the repo. The
      # service principal holds the operator role on the test RG and nothing
      # else, so these tests walk the same RBAC path a human operator does.
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Reset the harness (idempotent) and start the scenarios
        env:
          RG: rg-durableops-test-dev
          APP: func-durableops-harness-wi6b7
        run: |
          site="/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${RG}/providers/Microsoft.Web/sites/${APP}"
          fnkey=$(az rest --method post --uri "${site}/host/default/listkeys?api-version=2023-12-01" \
            --query "functionKeys.default" -o tsv)
          syskey=$(az rest --method post --uri "${site}/host/default/listkeys?api-version=2023-12-01" \
            --query "systemKeys.durabletask_extension" -o tsv)
          echo "::add-mask::$fnkey"
          echo "::add-mask::$syskey"

          # Purge first: the harness must be idempotent, so a rerun never
          # inherits instances from the last one.
          curl -sS -X DELETE \
            "https://${APP}.azurewebsites.net/runtime/webhooks/durabletask/instances?code=${syskey}&createdTimeFrom=2020-01-01T00:00:00Z" \
            -o /dev/null -w 'purge -> HTTP %{http_code}\n' || true

          for s in FailOnActivity FailAfterRetries StuckAtScheduling EternalTimer \
                   WaitForExternalEvent SubOrchestrationFail LongRunningHappy; do
            curl -sS -X POST "https://${APP}.azurewebsites.net/api/start/${s}?code=${fnkey}" \
              -o /dev/null -w "start ${s} -> HTTP %{http_code}\n"
          done

          # Give the orchestrations a moment to reach their states.
          sleep 30

          echo "DURABLEOPS_HARNESS_HOST=${APP}.azurewebsites.net" >> "$GITHUB_ENV"
          echo "DURABLEOPS_HARNESS_KEY=${syskey}" >> "$GITHUB_ENV"

      - name: Run integration tests
        run: npm run test:integration
