name: Integration (real Azure)

on:
  push:
    branches: [main]
  schedule:
    # Nightly: catches Azure-side drift (runtime upgrades, changed payload
    # shapes) on days nobody merged anything.
    - cron: '23 2 * * *'
  workflow_dispatch:

# Deliberately NOT on pull_request: PR feedback must stay fast and must never
# depend on a live task hub or a cloud credential.

permissions:
  contents: read

concurrency:
  # The harness has ONE task hub; two runs would fight over the same instances.
  group: integration-harness
  cancel-in-progress: false

jobs:
  integration:
    name: API modules against the live harness
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # OIDC federated credentials: no long-lived cloud secret in the repo. The
      # service principal holds the operator role on the test RG and nothing
      # else, so these tests walk the same RBAC path a human operator does.
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Reset the harness (idempotent) and start the scenarios
        env:
          RG: rg-durableops-test-dev
          APP: func-durableops-harness-wi6b7
        run: |
          site="/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${RG}/providers/Microsoft.Web/sites/${APP}"
          # No system key: seed the same way the tests operate — through the ARM
          # hostruntime proxy, with the caller's ARM token. That exercises the very
          # path the SPA uses, so a broken proxy fails setup before the tests run.
          token=$(az account get-access-token --resource https://management.azure.com \
            --query accessToken -o tsv)
          echo "::add-mask::$token"
          dt="https://management.azure.com${site}/hostruntime/runtime/webhooks/durabletask"

          # Purge first: the harness must be idempotent, so a rerun never inherits
          # instances from the last one. The empty body sets Content-Length: 0 —
          # the proxy answers 411 to a POST/DELETE that carries neither.
          curl -sS -X DELETE --data '' -H "Authorization: Bearer $token" \
            "${dt}/instances?api-version=2023-12-01&createdTimeFrom=2020-01-01T00:00:00Z" \
            -o /dev/null -w 'purge -> HTTP %{http_code}\n' || true

          for s in FailOnActivity FailAfterRetries StuckAtScheduling EternalTimer \
                   WaitForExternalEvent SubOrchestrationFail LongRunningHappy; do
            curl -sS -X POST --data '' -H "Authorization: Bearer $token" \
              "${dt}/orchestrators/${s}?api-version=2023-12-01" \
              -o /dev/null -w "start ${s} -> HTTP %{http_code}\n"
          done

          # Give the orchestrations a moment to reach their states.
          sleep 30

          echo "DURABLEOPS_HARNESS_RESOURCE_ID=${site}" >> "$GITHUB_ENV"
          echo "DURABLEOPS_HARNESS_TOKEN=${token}" >> "$GITHUB_ENV"

      - name: Run integration tests
        run: npm run test:integration
