name: CodeQL

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly, so newly published queries run against unchanged code too.
    - cron: '17 3 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - uses: github/codeql-action/analyze@v4
