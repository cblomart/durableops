version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # One PR for the dev toolchain rather than a swarm; runtime deps are
      # reviewed individually, since every one of them ships to the browser.
      dev-dependencies:
        dependency-type: development
        update-types: ['minor', 'patch']

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
